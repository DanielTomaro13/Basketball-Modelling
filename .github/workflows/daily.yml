name: daily-build

# Rebuilds both leagues and publishes the site. Everything is sourced from
# cloud-reachable public APIs (ESPN for the NBA, nbl.com.au for the NBL), so the
# whole pipeline runs here with no proxy, token or self-hosted runner.

on:
  schedule:
    - cron: "0 6,18 * * *"   # twice daily (06:00 / 18:00 UTC)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python -m src.run_daily

      - name: Commit refreshed site + reports
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # data/raw carries the incremental game-log cache (box scores) and
          # models/ the sigma calibration — committing them is what makes the
          # next run incremental instead of a full re-backfill.
          git add docs reports data models
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: daily rebuild ($(date -u +%Y-%m-%dT%H:%MZ))"
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "Push rejected (attempt $i) — rebasing onto latest main..."
            git pull --rebase origin main || { git rebase --abort; exit 1; }
          done
          echo "Failed to push after 5 attempts." >&2
          exit 1
