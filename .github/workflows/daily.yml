name: daily-build

# Rebuilds both leagues and publishes the site. Everything is sourced from
# cloud-reachable public APIs (ESPN for the NBA, nbl.com.au for the NBL), so the
# whole pipeline runs here with no proxy, token or self-hosted runner.

on:
  schedule:
    - cron: "0 6,18 * * *"   # twice daily (06:00 / 18:00 UTC)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python -m src.run_daily

      - name: Commit refreshed site + reports
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs reports data/fixtures.csv
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily rebuild ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
